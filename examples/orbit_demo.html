  <script>
  // Demo app logic (creates scene, lines, HUD, and gentle automatic rotation)
  (function(){
    // Minimal safety: if THREE is not present, show message
    if(typeof THREE === 'undefined'){
      const s=document.createElement('div');s.style.padding='20px';s.style.color='#fff';s.innerText='Three.js not loaded.';document.getElementById('scene').appendChild(s);return;

    const data = ORBIT;
    document.getElementById('r2').innerText = (data.r2||0).toFixed(3);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0A0B0E);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 100);
    camera.position.set(0,1.2,2.5);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio||1);
    document.getElementById('scene').appendChild(renderer.domElement);

    // lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dl = new THREE.DirectionalLight(0xffffff, 0.6); dl.position.set(2,3,1); scene.add(dl);

    // central body
    const bodyGeo = new THREE.SphereGeometry(0.03, 16, 12);
    const bodyMat = new THREE.MeshBasicMaterial({color:0xEF9F27});
    const body = new THREE.Mesh(bodyGeo, bodyMat); scene.add(body);

    // convert data to vectors
    const xs = data.x, ys = data.y, xp = data.x_pred, yp = data.y_pred;
    const ptsTrue = new Float32Array(xs.length*3);
    const ptsPred = new Float32Array(xs.length*3);
    for(let i=0;i<xs.length;i++){ ptsTrue[i*3]=xs[i]; ptsTrue[i*3+1]=0; ptsTrue[i*3+2]=ys[i]; ptsPred[i*3]=xp[i]; ptsPred[i*3+1]=0.01; ptsPred[i*3+2]=yp[i]; }

    const geomTrue = new THREE.BufferGeometry(); geomTrue.setAttribute('position', new THREE.BufferAttribute(ptsTrue,3));
    const matTrue = new THREE.LineBasicMaterial({color:0xEF9F27, linewidth:2});

    const geomPred = new THREE.BufferGeometry(); geomPred.setAttribute('position', new THREE.BufferAttribute(ptsPred,3));

    const linePred = new THREE.Line(geomPred, matPred); linePred.computeLineDistances(); scene.add(linePred);

    // camera auto-rotate
    let angle=0;
    function onResize(){ camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    window.addEventListener('resize', onResize);

    let last=0;
    function animate(t){
      const dt=(t-last)/1000||0; last=t;
      angle += dt*0.15;

      camera.position.z = 2.5*Math.cos(angle);
      camera.lookAt(0,0,0);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
